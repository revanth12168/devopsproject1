name: Deploy App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Decode SSH Key
        run: |
          echo "${{ secrets.SSH_KEY_BASE64 }}" | base64 --decode > private_key.pem
          chmod 600 private_key.pem

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key_path: private_key.pem
          script: |
            cd /home/ubuntu

            if [ ! -d "devops-project" ]; then
              git clone https://github.com/revanth12168/devopsproject1.git
            fi

            cd devops-project

            git pull origin main

            docker stop devops-container || true
            docker rm devops-container || true

            docker build -t devops-project .

            docker run -d -p 3000:3000 \
              --name devops-container \
              devops-project
